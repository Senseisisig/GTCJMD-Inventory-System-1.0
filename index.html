<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTCJMD Inventory System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>GTCJMD Inventory</h1>
            <p>Logistics Management System</p>
        </header>

        <section class="form-container">
            <input type="text" id="property" placeholder="Property Number">
            <input type="text" id="description" placeholder="Item Description">
            <input type="number" id="quantity" placeholder="Quantity" value="1">
            <input type="text" id="serial" placeholder="Serial Number">
            <input type="text" id="accountable" placeholder="Accountable Officer">
            
            <select id="locationSelect">
                <option value="Office">Office</option>
                <option value="Storage">Storage</option>
                <option value="Kitchen">Kitchen</option>
                <option value="GTCJ-MD">GTCJ-MD</option>
                <option value="Other">Other</option>
            </select>

            <button id="saveBtn" class="btn-stealth">Add to Inventory</button>
        </section>

        <hr>

        <section id="inventoryContainer" class="grid-container">
            </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
